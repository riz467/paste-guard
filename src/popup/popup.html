<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Paste Guard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    color: #18181b;
    background: #fff;
  }
  .header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid #eee;
  }
  .header .icon { font-size: 18px; }
  .header .title { font-weight: 600; font-size: 14px; }

  .master {
    display: flex; align-items: center;
    padding: 12px 16px; background: #fafafa;
    border-bottom: 1px solid #eee;
  }
  .master .label { flex: 1; font-weight: 600; }

  .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; cursor: pointer;
    background: #ccc; border-radius: 22px; transition: .2s;
  }
  .slider::before {
    content: ""; position: absolute;
    width: 16px; height: 16px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  input:checked + .slider { background: #16a34a; }
  input:checked + .slider::before { transform: translateX(18px); }

  .section { padding: 12px 16px; border-bottom: 1px solid #eee; }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 11px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 10px;
  }
  .row {
    display: flex; align-items: center;
    padding: 7px 0;
  }
  .row .label { flex: 1; }
  .row .sub { font-size: 11px; color: #999; margin-top: 1px; }

  .row input[type="checkbox"] {
    width: 16px; height: 16px; cursor: pointer; accent-color: #16a34a;
  }

  .thresh {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
  }
  .thresh input[type="range"] { flex: 1; accent-color: #16a34a; }
  .thresh .val { font-weight: 600; min-width: 26px; text-align: right; }
  .thresh-note {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #aaa; margin-top: 3px;
  }

  .thresh-guide {
    margin-top: 8px;
    background: #f4f4f5;
    border-radius: 6px;
    padding: 8px 10px;
  }
  .thresh-guide-title {
    font-size: 10px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: .03em;
    margin-bottom: 6px;
  }
  .thresh-guide-row {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 11px; margin-bottom: 3px;
    color: #52525b;
  }
  .thresh-guide-row:last-child { margin-bottom: 0; }
  .thresh-guide-row .range {
    font-weight: 600; color: #18181b;
    min-width: 38px; flex-shrink: 0;
  }
  .thresh-guide-row .example {
    color: #999; font-size: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  body.disabled .section { opacity: .4; pointer-events: none; }
</style>
</head>
<body>
  <div class="header">
    <span class="icon">🛡️</span>
    <span class="title">Paste Guard</span>
  </div>

  <div class="master">
    <span class="label">ペースト自動マスク</span>
    <label class="switch">
      <input type="checkbox" id="master">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="section-title">高度な検知</div>
    <div class="row">
      <div class="label">
        <div>構造解析 (kv)</div>
        <div class="sub">怖いキー名の値をマスク</div>
      </div>
      <input type="checkbox" id="kv">
    </div>
    <div class="row">
      <div class="label">
        <div>エントロピー検知</div>
        <div class="sub">変数名なしの乱数を検知</div>
      </div>
      <input type="checkbox" id="entropy">
    </div>
    <div id="threshWrap">
      <div class="thresh">
        <input type="range" id="thresh" min="3.5" max="6.5" step="0.1">
        <span class="val" id="threshVal">4.8</span>
      </div>
      <div class="thresh-note">
        <span>ゆるい（誤検知多）</span>
        <span>厳しい（見逃し多）</span>
      </div>
      <div class="thresh-guide">
        <div class="thresh-guide-title">感度の目安</div>
        <div class="thresh-guide-row">
          <span class="range">〜 4.0</span>
          <span>英単語も拾う</span>
          <span class="example">例: "password"</span>
        </div>
        <div class="thresh-guide-row">
          <span class="range">4.5 〜 5.0</span>
          <span>推奨・乱数を検知</span>
          <span class="example">例: "sk-xKp9…"</span>
        </div>
        <div class="thresh-guide-row">
          <span class="range">5.5 〜</span>
          <span>完全乱数のみ</span>
          <span class="example">例: 暗号鍵</span>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">パターン検知ルール</div>
    <div id="rules"></div>
  </div>

  <script src="../rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
