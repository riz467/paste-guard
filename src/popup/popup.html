<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Paste Guard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    color: #18181b;
    background: #fff;
  }
  .header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid #eee;
  }
  .header .icon { font-size: 18px; }
  .header .title { font-weight: 600; font-size: 14px; }

  .master {
    display: flex; align-items: center;
    padding: 12px 16px; background: #fafafa;
    border-bottom: 1px solid #eee;
  }
  .master .label { flex: 1; font-weight: 600; }

  .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; cursor: pointer;
    background: #ccc; border-radius: 22px; transition: .2s;
  }
  .slider::before {
    content: ""; position: absolute;
    width: 16px; height: 16px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  input:checked + .slider { background: #16a34a; }
  input:checked + .slider::before { transform: translateX(18px); }

  .section { padding: 12px 16px; }
  .section-title {
    font-size: 11px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 10px;
  }
  .rule {
    display: flex; align-items: center;
    padding: 7px 0;
  }
  .rule .label { flex: 1; }
  .rule input[type="checkbox"] {
    width: 16px; height: 16px; cursor: pointer; accent-color: #16a34a;
  }

  body.disabled .section { opacity: .4; pointer-events: none; }
</style>
</head>
<body>
  <div class="header">
    <span class="icon">🛡️</span>
    <span class="title">Paste Guard</span>
  </div>

  <div class="master">
    <span class="label">ペースト自動マスク</span>
    <label class="switch">
      <input type="checkbox" id="master">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="section-title">検知ルール</div>
    <div id="rules"></div>
  </div>

  <script src="../rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
